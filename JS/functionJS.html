<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
    <script>
        //function:block of code,used or defined to perform specific task
        //Types of Function
        //normal function: -with para,without para and with default

        function demo(){
            console.log("Hello JS");
        }
        demo();//function calling
        //with parameters
        function demo1(text){
            console.log("Hello "+ text);
        }
        demo1();
        //default PARAMETER
        function add(a,b){
            console.log("Add "+ (a+b));
        }
        add(123);
        //synchronous function
        function cal(){
            function add(a,b){
                console.log("Add "+ (a+b));
            }
        function sub(a,b){
            console.log("Sub "+ (a-b));
        }
        function mul(a,b){
            console.log("Mul "+ (a*b));
        }
        add(10,20);
        sub(15,6);
        mul(10,20);
    }
    cal();
    // annonymous function: -function without name
    let msg=function(){
        console.log("Hello ABES");
        console.log(typeof(msg));
    }
    msg();
    let msg1()>=console.log("Hello Abesss EC");
    msg1();
    //arrow function using multiple parameters
    let msg2=(a,b)=>{
        var num1=a;
        var num2=b;
        var res=num1/num2;
        console.log("Div "+ res);
    }
    msg2(10,20);
    // IIFE:- 
    (function(){
        console.log("Hello World");
    })();
    </script>
</body>
</html>
